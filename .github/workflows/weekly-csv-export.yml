name: Export Lottery CSV Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "37 15 * * 0"

permissions:
  contents: read

concurrency:
  group: lottery-csv-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ETL_ENV: production
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_XSMN_BUCKET_NAME: ${{ secrets.R2_XSMN_BUCKET_NAME }}
      R2_XSMN_ACCOUNT_ID: ${{ secrets.R2_XSMN_ACCOUNT_ID }}
      R2_XSMN_ACCESS_KEY_ID: ${{ secrets.R2_XSMN_ACCESS_KEY_ID }}
      R2_XSMN_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMN_SECRET_ACCESS_KEY }}
      R2_XSMN_ENDPOINT_URL: ${{ secrets.R2_XSMN_ENDPOINT_URL }}
      R2_XSMT_BUCKET_NAME: ${{ secrets.R2_XSMT_BUCKET_NAME }}
      R2_XSMT_ACCOUNT_ID: ${{ secrets.R2_XSMT_ACCOUNT_ID }}
      R2_XSMT_ACCESS_KEY_ID: ${{ secrets.R2_XSMT_ACCESS_KEY_ID }}
      R2_XSMT_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMT_SECRET_ACCESS_KEY }}
      R2_XSMT_ENDPOINT_URL: ${{ secrets.R2_XSMT_ENDPOINT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install locked runtime dependencies
        run: uv sync --frozen --no-dev

      - name: Export manifest-addressed CSV files
        shell: bash
        run: |
          set -o pipefail
          uv run lottery-etl export-csv --storage r2 --region all | tee csv-export.json
          jq -e '
            type == "array" and
            length == 3 and
            ([.[].region] | sort) == ["xsmb", "xsmn", "xsmt"] and
            all(.[];
              (.run_id | type == "string" and length > 0) and
              (.objects | type == "array" and length > 0)
            )
          ' csv-export.json >/dev/null

      - name: Write job summary
        if: always()
        run: |
          echo "### Weekly lottery CSV export" >> "$GITHUB_STEP_SUMMARY"
          if [[ -s csv-export.json ]]; then
            jq -r '.[] | "- \(.region | ascii_upcase): run=\(.run_id), files=\(.objects | length)"' \
              csv-export.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "CSV export failed before producing a manifest." >> "$GITHUB_STEP_SUMMARY"
          fi
