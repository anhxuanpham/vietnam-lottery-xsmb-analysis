name: Daily Vietnam Lottery ETL

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional YYYY-MM-DD draw date
        required: false
      force:
        description: Replace an existing successful date
        type: boolean
        default: false
      region:
        description: Data lake to run
        type: choice
        options:
          - all
          - xsmb
          - xsmn
          - xsmt
        default: all
  schedule:
    # Queue before the draw cutoff so GitHub scheduler delay is less likely to
    # push the actual ETL late into the evening. The gate job below still
    # prevents scheduled extraction before 18:35 Asia/Ho_Chi_Minh.
    - cron: "17 11 * * *"

permissions:
  contents: read

jobs:
  draw-window:
    name: Wait for the 18:35 draw cutoff
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait until 18:35 Vietnam time
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          vietnam_date="$(TZ=Asia/Ho_Chi_Minh date +%F)"
          now_epoch="$(date +%s)"
          cutoff_epoch="$(TZ=Asia/Ho_Chi_Minh date --date="${vietnam_date} 18:35:00" +%s)"
          wait_seconds=$((cutoff_epoch - now_epoch))

          if (( wait_seconds > 1200 )); then
            echo "Refusing an unexpected ${wait_seconds}-second wait." >&2
            exit 1
          fi
          if (( wait_seconds > 0 )); then
            echo "Scheduled early; waiting ${wait_seconds} seconds for the draw cutoff."
            sleep "$wait_seconds"
          else
            echo "Draw cutoff has passed; starting ETL immediately."
          fi

  etl:
    name: ETL (${{ matrix.region }})
    needs: draw-window
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: vietnam-lottery-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        region:
          - xsmb
          - xsmn
          - xsmt
    env:
      ETL_ENV: production
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_XSMN_BUCKET_NAME: ${{ secrets.R2_XSMN_BUCKET_NAME }}
      R2_XSMN_ACCOUNT_ID: ${{ secrets.R2_XSMN_ACCOUNT_ID }}
      R2_XSMN_ACCESS_KEY_ID: ${{ secrets.R2_XSMN_ACCESS_KEY_ID }}
      R2_XSMN_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMN_SECRET_ACCESS_KEY }}
      R2_XSMN_ENDPOINT_URL: ${{ secrets.R2_XSMN_ENDPOINT_URL }}
      R2_XSMT_BUCKET_NAME: ${{ secrets.R2_XSMT_BUCKET_NAME }}
      R2_XSMT_ACCOUNT_ID: ${{ secrets.R2_XSMT_ACCOUNT_ID }}
      R2_XSMT_ACCESS_KEY_ID: ${{ secrets.R2_XSMT_ACCESS_KEY_ID }}
      R2_XSMT_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMT_SECRET_ACCESS_KEY }}
      R2_XSMT_ENDPOINT_URL: ${{ secrets.R2_XSMT_ENDPOINT_URL }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_XSMN_PUBLIC_BASE_URL: ${{ vars.R2_XSMN_PUBLIC_BASE_URL }}
      R2_XSMT_PUBLIC_BASE_URL: ${{ vars.R2_XSMT_PUBLIC_BASE_URL }}
      SOURCE_BASE_URL: ${{ vars.SOURCE_BASE_URL }}
      XSMN_FALLBACK_BASE_URL: ${{ vars.XSMN_FALLBACK_BASE_URL }}
      XSMT_FALLBACK_BASE_URL: ${{ vars.XSMT_FALLBACK_BASE_URL }}
      TARGET_DATE: ${{ inputs.target_date }}
      FORCE: ${{ inputs.force }}
      REQUESTED_REGION: ${{ inputs.region }}
    steps:
      - name: Select requested region
        id: select
        shell: bash
        run: |
          requested="${REQUESTED_REGION:-all}"
          if [[ "${{ matrix.region }}" == "xsmt" && -z "$R2_XSMT_BUCKET_NAME" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && ( "$requested" == "all" || "$requested" == "xsmt" ) ]]; then
              echo "R2_XSMT_BUCKET_NAME is required before manually running XSMT." >&2
              exit 1
            fi
            echo "Skipping scheduled XSMT until R2_XSMT_BUCKET_NAME is configured."
            exit 0
          fi
          if [[ "$requested" == "all" || "$requested" == "${{ matrix.region }}" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.select.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        if: steps.select.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install locked runtime dependencies
        if: steps.select.outputs.should_run == 'true'
        run: uv sync --frozen --no-dev

      - name: Run ETL
        if: steps.select.outputs.should_run == 'true'
        shell: bash
        run: |
          command=(uv run lottery-etl run --storage r2 --region "${{ matrix.region }}")
          if [[ -n "$TARGET_DATE" ]]; then
            command+=(--target-date "$TARGET_DATE")
          fi
          if [[ "$FORCE" == "true" ]]; then
            command+=(--force)
          fi
          "${command[@]}" | tee etl-result.json

      - name: Write job summary
        if: always() && steps.select.outputs.should_run == 'true'
        shell: bash
        run: |
          echo "### Daily Vietnam Lottery ETL (${{ matrix.region }})" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f etl-result.json ]]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat etl-result.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ETL failed before producing a result manifest." >> "$GITHUB_STEP_SUMMARY"
          fi
