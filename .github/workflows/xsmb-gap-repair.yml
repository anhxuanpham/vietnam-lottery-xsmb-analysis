name: Repair XSMB Historical Gaps

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: First historical date to inspect (YYYY-MM-DD)
        required: true
        type: string
      to_date:
        description: Last historical date to inspect (must be before today in Vietnam)
        required: true
        type: string
      classify_legacy_archive_gaps:
        description: Classify the four independently corroborated 2006-2007 Tet archive gaps as no_draw
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: vietnam-lottery-xsmb
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ETL_ENV: production
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      SOURCE_BASE_URL: ${{ vars.SOURCE_BASE_URL }}
      REPAIR_FROM: ${{ inputs.from_date }}
      REPAIR_TO: ${{ inputs.to_date }}
      CLASSIFY_LEGACY_ARCHIVE_GAPS: ${{ inputs.classify_legacy_archive_gaps }}
    steps:
      - name: Validate repair range
        shell: bash
        run: |
          if [[ ! "$REPAIR_FROM" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] \
            || ! date --date="$REPAIR_FROM" +%F >/dev/null 2>&1; then
            echo "from_date must be a real date in YYYY-MM-DD format." >&2
            exit 1
          fi
          if [[ ! "$REPAIR_TO" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] \
            || ! date --date="$REPAIR_TO" +%F >/dev/null 2>&1; then
            echo "to_date must be a real date in YYYY-MM-DD format." >&2
            exit 1
          fi
          vietnam_today="$(TZ=Asia/Ho_Chi_Minh date +%F)"
          if [[ "$REPAIR_FROM" < "2005-10-01" || "$REPAIR_TO" < "$REPAIR_FROM" ]]; then
            echo "Repair range must start on/after 2005-10-01 and end on/after its start." >&2
            exit 1
          fi
          if [[ "$REPAIR_TO" > "$vietnam_today" || "$REPAIR_TO" == "$vietnam_today" ]]; then
            echo "Historical repair must end before the current Vietnam date ($vietnam_today)." >&2
            exit 1
          fi
          if [[ "$CLASSIFY_LEGACY_ARCHIVE_GAPS" == "true" ]] \
            && { [[ "$REPAIR_FROM" > "2006-01-28" ]] || [[ "$REPAIR_TO" < "2007-02-17" ]]; }; then
            echo "The selected range must cover all four legacy archive gaps before classifying them." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install locked runtime dependencies
        run: uv sync --frozen --no-dev

      - name: Record independently corroborated legacy no-draw dates
        if: inputs.classify_legacy_archive_gaps
        shell: bash
        run: |
          evidence_2006="Independent archive reconciliation: the XSMB chronologies at https://www.minhngoc.net.vn/kqxs/mien-bac/30-01-2006.html and https://xoso.com/xo-so-mien-bac/30-01-2006.html both jump from 2006-01-27 to 2006-01-30."
          evidence_2007="Independent archive reconciliation: the XSMB chronologies at https://www.minhngoc.net/kqxs/mien-bac/18-02-2007.html and https://xoso.com/xo-so-mien-bac/21-02-2007.html both jump from 2007-02-15 to 2007-02-18."
          for target_date in 2006-01-28 2006-01-29; do
            uv run lottery-etl no-draw \
              --storage r2 \
              --region xsmb \
              --target-date "$target_date" \
              --detail "$evidence_2006" | tee -a legacy-no-draw-results.txt
          done
          for target_date in 2007-02-16 2007-02-17; do
            uv run lottery-etl no-draw \
              --storage r2 \
              --region xsmb \
              --target-date "$target_date" \
              --detail "$evidence_2007" | tee -a legacy-no-draw-results.txt
          done

      - name: Backfill unresolved XSMB dates and publish once
        shell: bash
        run: |
          set -o pipefail
          uv run lottery-etl backfill \
            --storage r2 \
            --region xsmb \
            --from "$REPAIR_FROM" \
            --to "$REPAIR_TO" | tee xsmb-gap-repair.json
          if jq --exit-status 'any(.[]; .status == "failed")' xsmb-gap-repair.json >/dev/null; then
            echo "One or more XSMB dates still failed:" >&2
            jq -r '.[] | select(.status == "failed") | "- \(.target_date): \(.message)"' \
              xsmb-gap-repair.json >&2
            exit 1
          fi

      - name: Audit repaired XSMB history
        shell: bash
        run: |
          set -o pipefail
          uv run lottery-etl audit-history \
            --storage r2 \
            --region xsmb \
            --to "$REPAIR_TO" \
            --json | tee history-audit.json

      - name: Upload repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: xsmb-gap-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            legacy-no-draw-results.txt
            xsmb-gap-repair.json
            history-audit.json
          if-no-files-found: warn
          retention-days: 30

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "### XSMB historical gap repair" >> "$GITHUB_STEP_SUMMARY"
          echo "Range: \`$REPAIR_FROM\` through \`$REPAIR_TO\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f xsmb-gap-repair.json ]]; then
            jq -r 'group_by(.status)[] | "- \(.[0].status): \(length)"' \
              xsmb-gap-repair.json >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -f history-audit.json ]]; then
            jq -r '"- audit healthy: \(.healthy)\n- remaining findings: \(.issues | length)"' \
              history-audit.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- audit did not produce a report" >> "$GITHUB_STEP_SUMMARY"
          fi
