name: Publish Lottery Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # Avoid the top-of-hour GitHub Actions scheduling hotspot.
    - cron: "47 12 * * *"

permissions:
  contents: read

concurrency:
  group: lottery-dashboard-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ETL_ENV: production
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_XSMN_BUCKET_NAME: ${{ secrets.R2_XSMN_BUCKET_NAME }}
      R2_XSMN_ACCOUNT_ID: ${{ secrets.R2_XSMN_ACCOUNT_ID }}
      R2_XSMN_ACCESS_KEY_ID: ${{ secrets.R2_XSMN_ACCESS_KEY_ID }}
      R2_XSMN_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMN_SECRET_ACCESS_KEY }}
      R2_XSMN_ENDPOINT_URL: ${{ secrets.R2_XSMN_ENDPOINT_URL }}
      R2_XSMT_BUCKET_NAME: ${{ secrets.R2_XSMT_BUCKET_NAME }}
      R2_XSMT_ACCOUNT_ID: ${{ secrets.R2_XSMT_ACCOUNT_ID }}
      R2_XSMT_ACCESS_KEY_ID: ${{ secrets.R2_XSMT_ACCESS_KEY_ID }}
      R2_XSMT_SECRET_ACCESS_KEY: ${{ secrets.R2_XSMT_SECRET_ACCESS_KEY }}
      R2_XSMT_ENDPOINT_URL: ${{ secrets.R2_XSMT_ENDPOINT_URL }}
      DASHBOARD_INGEST_URL: ${{ vars.DASHBOARD_INGEST_URL }}
      DASHBOARD_INGEST_TOKEN: ${{ secrets.DASHBOARD_INGEST_TOKEN }}
      DASHBOARD_SITES_BYPASS_TOKEN: ${{ secrets.DASHBOARD_SITES_BYPASS_TOKEN }}
    steps:
      - name: Check dashboard configuration
        id: config
        shell: bash
        run: |
          if [[ -n "$DASHBOARD_INGEST_URL" && -n "$DASHBOARD_INGEST_TOKEN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Dashboard publishing is disabled until DASHBOARD_INGEST_URL and DASHBOARD_INGEST_TOKEN are set."
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              echo "A manual publish requires dashboard ingest configuration." >&2
              exit 1
            fi
          fi

      - name: Checkout
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        if: steps.config.outputs.ready == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install locked runtime dependencies
        if: steps.config.outputs.ready == 'true'
        run: uv sync --frozen --no-dev

      - name: Verify published Gold metadata
        id: metadata
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          uv run lottery-etl status --storage r2 --region all --json | tee lake-status.json
          vietnam_time="$(TZ=Asia/Ho_Chi_Minh date +%H%M)"
          if (( 10#$vietnam_time < 1835 )); then
            expected_date="$(TZ=Asia/Ho_Chi_Minh date --date='yesterday' +%F)"
          else
            expected_date="$(TZ=Asia/Ho_Chi_Minh date +%F)"
          fi
          echo "expected_date=$expected_date" >> "$GITHUB_OUTPUT"
          jq --exit-status --arg expected_date "$expected_date" \
            'all(.[]; .target_date == $expected_date)' \
            lake-status.json >/dev/null

      - name: Audit complete published history
        id: history_audit
        if: >-
          always() &&
          !cancelled() &&
          steps.config.outputs.ready == 'true' &&
          steps.metadata.outputs.expected_date != ''
        shell: bash
        run: |
          set -o pipefail
          uv run lottery-etl audit-history \
            --storage r2 \
            --region all \
            --to "${{ steps.metadata.outputs.expected_date }}" \
            --json | tee history-audit.json

      - name: Export and publish compact payloads
        id: publish_payloads
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          request_headers=(
            -H "Authorization: Bearer $DASHBOARD_INGEST_TOKEN"
            -H "Content-Type: application/json"
          )
          if [[ -n "$DASHBOARD_SITES_BYPASS_TOKEN" ]]; then
            request_headers+=(
              -H "OAI-Sites-Authorization: Bearer $DASHBOARD_SITES_BYPASS_TOKEN"
            )
          fi

          for region in xsmb xsmn xsmt; do
            output="/tmp/${region}-dashboard.json"
            uv run python scripts/export_serving_data.py \
              --storage r2 \
              --region "$region" \
              --output "$output"
            curl \
              --fail-with-body \
              --show-error \
              --silent \
              --retry 3 \
              --retry-all-errors \
              --request PUT \
              "${request_headers[@]}" \
              --data-binary "@$output" \
              "${DASHBOARD_INGEST_URL}?region=${region}"
          done

      - name: Upload publication health evidence
        if: always() && steps.config.outputs.ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lottery-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            lake-status.json
            history-audit.json
          if-no-files-found: warn
          retention-days: 30

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "### Lottery dashboard publish" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.config.outputs.ready }}" != "true" ]]; then
            echo "Skipped: dashboard ingest has not been configured." >> "$GITHUB_STEP_SUMMARY"
          else
            if [[ -s lake-status.json ]] && jq empty lake-status.json >/dev/null 2>&1; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "#### Metadata gate" >> "$GITHUB_STEP_SUMMARY"
              jq -r '.[] | "- \(.region | ascii_upcase): healthy=\(.healthy), target=\(.target_date)"' \
                lake-status.json >> "$GITHUB_STEP_SUMMARY"
            fi
            if [[ -s history-audit.json ]] && jq empty history-audit.json >/dev/null 2>&1; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "#### Complete-history audit" >> "$GITHUB_STEP_SUMMARY"
              jq -r 'to_entries[] | "- \(.key | ascii_upcase): healthy=\(.value.healthy), range=\(.value.from_date)..\(.value.to_date), statuses=[\(.value.status_counts | to_entries | map("\(.key)=\(.value)") | join(", "))], findings=\(.value.issues | length)"' \
                history-audit.json >> "$GITHUB_STEP_SUMMARY"
              jq -r 'to_entries[] | .key as $region | .value.issues[]? | "- \($region | ascii_upcase) \(.severity | ascii_upcase) \(.code): \(.message)"' \
                history-audit.json >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${{ steps.metadata.outcome }}" == "failure" ]]; then
              echo "Publishing blocked by the Gold metadata gate." >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ steps.history_audit.outcome }}" == "failure" ]]; then
              echo "Publishing blocked by the complete-history audit." >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ steps.publish_payloads.outcome }}" == "success" ]]; then
              echo "Published compact XSMB, XSMN, and XSMT payloads." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Dashboard publishing failed. Inspect the first failed workflow step." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
